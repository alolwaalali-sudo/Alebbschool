<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة عقد قران | غانم ولولوة</title>

<!-- خطوط جوجل: Amiri للنصوص الدينية والعناوين والأسماء، Tajawal للنصوص العامة -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#FBF6EE;
    --cream-soft:#F6EFE4;
    --cream-deep:#EFE3D6;
    --rose:#B98089;
    --rose-deep:#93555F;
    --rose-light:#E3C3C7;
    --rose-pale:#F0DADD;
    --ink:#4A4038;
    --ink-soft:#8C7F72;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    min-height:100vh;
    background:var(--cream);
    font-family:'Tajawal', sans-serif;
    color:var(--ink);
    overflow-x:hidden;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    background:
      radial-gradient(circle at 50% 0%, rgba(185,128,137,0.08), transparent 60%),
      radial-gradient(circle at 50% 100%, rgba(185,128,137,0.08), transparent 60%),
      linear-gradient(180deg, var(--cream) 0%, var(--cream-soft) 55%, var(--cream-deep) 100%);
  }

  /* بتلات وردية عائمة ببطء في الخلفية */
  .petal{
    position:fixed;
    background:var(--rose-light);
    pointer-events:none;
    z-index:0;
    border-radius:50% 50% 50% 0;
    animation:floatUp linear infinite;
    opacity:0;
  }

  /* ============ البطاقة ============ */
  .card{
    position:relative;
    width:100%;
    max-width:480px;
    background:linear-gradient(180deg, rgba(255,253,249,0.98), rgba(246,239,228,0.98));
    border-radius:2px;
    padding:clamp(32px, 6vw, 52px) clamp(22px, 6vw, 42px) 0;
    box-shadow:
      0 30px 60px rgba(74,64,56,0.14),
      0 0 0 1px rgba(185,128,137,0.18);
    opacity:0;
    animation:cardEntrance 1.1s ease-out 0.15s forwards;
    text-align:center;
    z-index:1;
    overflow:hidden;
  }

  .card-inner{ position:relative; z-index:3; }

  /* ============ عناصر الظهور التدريجي ============ */
  .fade-item{
    opacity:0;
    transform:translateY(14px);
    animation:fadeInUp 0.9s ease-out forwards;
  }
  .fade-1{ animation-delay:0.5s; }
  .fade-2{ animation-delay:0.9s; }
  .fade-3{ animation-delay:1.3s; }
  .fade-4{ animation-delay:1.7s; }
  .fade-5{ animation-delay:2.1s; }
  .fade-6{ animation-delay:2.5s; }
  .fade-7{ animation-delay:2.9s; }
  .fade-8{ animation-delay:3.3s; }

  /* ============ الآية القرآنية (مختصرة وهادئة) ============ */
  .basmala{
    font-family:'Amiri', serif;
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:1px;
    margin-bottom:10px;
  }
  .ayah{
    font-family:'Amiri', 'Noto Naskh Arabic', serif;
    font-size:clamp(12.5px, 2.6vw, 14.5px);
    line-height:1.9;
    color:var(--ink-soft);
    font-weight:400;
  }
  .surah-ref{
    font-family:'Tajawal', sans-serif;
    font-size:10.5px;
    color:var(--rose);
    letter-spacing:1.5px;
    margin-top:8px;
  }

  .hairline{
    width:34px;
    height:1px;
    background:var(--rose);
    opacity:0.5;
    margin:20px auto;
  }

  /* ============ الشعار/المونوغرام ============ */
  .crest{
    width:clamp(150px, 34vw, 190px);
    margin:4px auto 6px;
  }
  .crest svg{
    width:100%;
    height:auto;
    display:block;
    animation:crestPulse 6s ease-in-out infinite;
  }

  /* ============ عبارة الدعوة ============ */
  .invite-phrase{
    font-size:clamp(14px, 3vw, 15.5px);
    color:var(--ink);
    opacity:0.85;
    line-height:1.9;
    margin-top:6px;
  }

  /* ============ اسم المدعو ============ */
  .guest-label{
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:2px;
    margin-top:20px;
  }
  #guest-name{
    font-family:'Amiri', serif;
    font-size:clamp(18px, 4vw, 23px);
    color:var(--rose-deep);
    margin-top:6px;
    font-weight:700;
  }

  /* ============ أسماء العروسين (مكدّسة كما في التصميم المرجعي) ============ */
  .couple{
    position:relative;
    margin:22px 0 4px;
  }
  .couple::before{
    content:"";
    position:absolute;
    inset:-16px -10px;
    background:radial-gradient(ellipse at center, rgba(185,128,137,0.16), transparent 70%);
    filter:blur(6px);
    z-index:-1;
    animation:glowPulse 4s ease-in-out infinite;
  }
  .couple .name{
    display:block;
    font-family:'Amiri', serif;
    font-weight:700;
    font-size:clamp(38px, 10vw, 56px);
    line-height:1.25;
    background:linear-gradient(100deg, var(--rose-deep) 0%, var(--rose) 25%, var(--rose-light) 45%, #fbe9ea 55%, var(--rose-light) 65%, var(--rose) 80%, var(--rose-deep) 100%);
    background-size:250% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:shimmer 5s linear infinite;
  }

  .mashaallah{
    font-size:clamp(12.5px, 2.8vw, 14px);
    color:var(--ink-soft);
    margin-top:10px;
    letter-spacing:0.5px;
  }

  /* ============ صف التاريخ ============ */
  .date-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    margin-top:22px;
  }
  .date-row .seal{ width:20px; height:20px; opacity:0.8; }
  .day-name, .full-date{
    font-size:clamp(13px, 2.8vw, 15px);
    color:var(--ink);
    letter-spacing:0.5px;
  }
  .full-date{ font-family:'Amiri', serif; font-weight:700; color:var(--rose-deep); }

  /* ============ العبارة الختامية ============ */
  .closing{
    margin-top:20px;
    font-size:clamp(12.5px, 2.8vw, 14px);
    color:var(--ink-soft);
    line-height:1.9;
  }

  /* ============ الزخرفة الزهرية أسفل البطاقة ============ */
  .floral-footer{
    display:block;
    width:100%;
    margin-top:26px;
  }
  /* تلألؤ هادئ للنقاط الصغيرة داخل الباقة */
  .floral-footer .dot{
    animation:twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0.25; }
    50%{ opacity:0.95; }
  }

  /* ============ الحركات ============ */
  @keyframes cardEntrance{
    from{ opacity:0; transform:translateY(30px) scale(0.97); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes fadeInUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes shimmer{
    0%{ background-position:0% 50%; }
    100%{ background-position:250% 50%; }
  }
  @keyframes glowPulse{
    0%,100%{ opacity:0.55; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.06); }
  }
  @keyframes crestPulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.02); }
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.7; }
    90%{ opacity:0.4; }
    100%{ transform:translateY(-100vh) translateX(24px) rotate(200deg); opacity:0; }
  }

  @media (max-width:420px){
    .date-row{ gap:10px; }
  }
</style>

<script>
  // قراءة اسم المدعو من رابط الصفحة عبر query parameter باسم "name"
  const urlParams = new URLSearchParams(window.location.search);
  const rawGuestName = urlParams.get('name');

  let displayName = '';

  if (rawGuestName) {
    try {
      displayName = decodeURIComponent(rawGuestName);
    } catch (e) {
      // في حال احتوى الاسم على رموز غير قابلة لفك الترميز، نستخدم القيمة كما وردت
      displayName = rawGuestName;
    }
  }

  const guestNameEl = document.getElementById('guest-name');
  if (displayName) {
    guestNameEl.textContent = displayName;
  } else {
    // إخفاء العنصر إذا لم يوجد اسم في الرابط
    guestNameEl.style.display = 'none';
  }

  // إنشاء بتلات وردية عائمة برفق في الخلفية لإضفاء حيوية هادئة على البطاقة
  const petalContainer = document.getElementById('petals');
  const petalCount = 16;

  for (let i = 0; i < petalCount; i++) {
    const petal = document.createElement('span');
    petal.className = 'petal';

    const size = 6 + Math.random() * 8;
    const left = Math.random() * 100;
    const duration = 12 + Math.random() * 10;
    const delay = Math.random() * 14;

    petal.style.width = `${size}px`;
    petal.style.height = `${size}px`;
    petal.style.left = `${left}vw`;
    petal.style.bottom = `-20px`;
    petal.style.animationDuration = `${duration}s`;
    petal.style.animationDelay = `${delay}s`;

    petalContainer.appendChild(petal);
  }
</script>

</body>
</html>
